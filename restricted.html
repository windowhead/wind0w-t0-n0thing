<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Portfolio</title>
    <meta name="author" content="Nate">

    <!-- Favicon -->
    <link rel="apple-touch-icon" sizes="60x60" href="img/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="img/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="img/favicon/favicon-16x16.png">
    <link rel="manifest" href="img/favicon/site.webmanifest">
    <link rel="mask-icon" href="img/favicon/safari-pinned-tab.svg" color="#5bbad5">
    <meta name="msapplication-TileColor" content="#2d89ef">
    <meta name="theme-color" content="#ffffff">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link type="text/css" rel="stylesheet" href="css/w95.css">

</head>
<body>

    <header class="header-global">
        <nav id="navbar-main" class="navbar d-flex flex-row align-items-center navbar-main navbar-expand-lg navbar-dark justify-content-between">
            <ul class="navbar-nav navbar-nav-hover flex-row align-items-center">
                <li class="nav-item">
                    <a href="index.html" class="nav-link" role="button">
                        <span class="nav-link-inner-text">Back to home</span>
                    </a>
                </li>
            </ul>
        </nav>
    </header>

<section id="password-section" class="full-section">
    <div id="password-card" class="card card-tertiary p-4">
        <h4 class="text-center mb-2">Restricted Area</h4>
        <p class="text-center mb-4">Enter password to continue</p>
        <input type="password" id="password-input" class="form-control mb-3" placeholder="Password">
        <div class="d-flex gap-2 mb-3">
            <button id="toggle-password" class="btn btn-secondary w-50">Reveal</button>
            <button id="submit-password" class="btn btn-primary w-50">Enter</button>
        </div>
        <p id="error-message" style="color:red; display:none;" class="text-center">
            Incorrect password
        </p>
    </div>
</section>




<script>
const correctPassword = "1234";

const passwordInput = document.getElementById("password-input");
const submitButton = document.getElementById("submit-password");
const toggleButton = document.getElementById("toggle-password");
const errorMessage = document.getElementById("error-message");

function checkPassword() {
    if(passwordInput.value === correctPassword){

        sessionStorage.setItem("authenticated", "true"); // ADD THIS

        window.location.href = "marketing.html"; 
    } else {
        errorMessage.style.display = "block";
    }
}

submitButton.addEventListener("click", checkPassword);

passwordInput.addEventListener("keydown", function(e){
    if(e.key === "Enter"){
        checkPassword();
    }
});

toggleButton.addEventListener("click", function(){
    if(passwordInput.type === "password"){
        passwordInput.type = "text";
        toggleButton.textContent = "Hide";
    } else {
        passwordInput.type = "password";
        toggleButton.textContent = "Reveal";
    }
});
</script>

</body>
</html>
